[profile.default]
src = "src"
out = "out"
libs = ["lib", "../../node_modules"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 50
evm_version = "paris"

[rpc_endpoints]
privacy_node = "${PRIVACY_NODE_RPC_URL}"
public_chain = "${PUBLIC_CHAIN_RPC_URL}"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
