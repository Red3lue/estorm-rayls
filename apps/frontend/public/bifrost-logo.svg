<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c4dff" />
      <stop offset="50%" style="stop-color:#e040fb" />
      <stop offset="100%" style="stop-color:#ffa726" />
    </linearGradient>
  </defs>

  <!-- Single bridge arc -->
  <path d="M20 72 Q50 18 80 72" fill="none" stroke="url(#bg)" stroke-width="6" stroke-linecap="round"/>

  <!-- Two pillars -->
  <line x1="20" y1="72" x2="20" y2="86" stroke="url(#bg)" stroke-width="6" stroke-linecap="round"/>
  <line x1="80" y1="72" x2="80" y2="86" stroke="url(#bg)" stroke-width="6" stroke-linecap="round"/>
</svg>
